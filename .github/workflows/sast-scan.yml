name: SAST Scan
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # --ignore-scripts bloquea preinstall/postinstall (supply chain)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Genera coverage/lcov.info que SonarCloud leerá via sonar-project.properties
      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          AUTH0_DOMAIN: test.auth0.com
          AUTH0_AUDIENCE: https://biotrack.api.test
          AUTH0_MGMT_CLIENT_ID: ci_mgmt_client_id
          AUTH0_MGMT_CLIENT_SECRET: ci_mgmt_client_secret
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          EMAIL_FROM: no-reply@biotrack.test
          FRONTEND_URL: http://localhost:5173

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
