# ─── docker-compose.prod.yml — Entorno de PRODUCCIÓN ─────────────────────────
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# Requisitos:
#   - Archivo .env con todas las variables (ver .env.example)
#   - POSTGRES_PASSWORD debe estar definido en .env (no usar el default)
#
# Primera vez:
#   docker compose -f docker-compose.prod.yml run --rm migrate
#   docker compose -f docker-compose.prod.yml run --rm seed
#   docker compose -f docker-compose.prod.yml up -d

name: biotrack-prod

services:
  # ─── Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: biotrack_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: biotrack_db
      POSTGRES_USER: biotrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}     # Obligatorio en .env, sin default
    expose:
      - "5432"                                    # Solo accesible dentro de la red interna
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biotrack -d biotrack_db"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── API (imagen compilada, stage runner) ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner            # Imagen optimizada de producción (sin devDeps, sin tsx)
    container_name: biotrack_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://biotrack:${POSTGRES_PASSWORD}@postgres:5432/biotrack_db
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads_prod:/app/uploads

  # ─── Migraciones (ejecutar una vez antes del primer deploy) ─────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: biotrack_migrate_prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://biotrack:${POSTGRES_PASSWORD}@postgres:5432/biotrack_db
    command: npx prisma migrate deploy   # deploy (no dev) para producción
    profiles:
      - tools

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: biotrack_seed_prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://biotrack:${POSTGRES_PASSWORD}@postgres:5432/biotrack_db
    command: npm run db:seed
    profiles:
      - tools

volumes:
  postgres_prod_data:
  uploads_prod:

networks:
  default:
    name: biotrack_prod_network
